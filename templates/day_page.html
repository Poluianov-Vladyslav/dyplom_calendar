{% extends "head_panel.html" %}
{% block title %}День - Задачі{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="/static/day_page.css">{% endblock %}
{% block content %}

<div class="day-layout">
    <div class="time-panel" id="timePanel"></div>
    <div class="tasks-panel">
        <div id="tasksContainer" class="tasks-container"></div>
    </div>
    <div class="details-panel" id="detailsPanel">
        <button class="create-task-btn" onclick="openCreateModal()">Створити задачу</button>
        <h3>📋 Деталі задачі</h3>
        <div id="taskDetails" class="task-details">
            <p class="no-selection">Натисніть на задачу</p>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">📝 Нова задача</h3>
        <input type="text" id="taskName" placeholder="Назва задачі">
        <input type="date" id="taskDate" value="">
        <div class="time-group">
            <input type="time" id="taskStart" step="60" style="flex:1; padding:8px;">
            <input type="time" id="taskEnd" step="60" style="flex:1; padding:8px;">
        </div>
        <textarea id="taskDesc" placeholder="Опис (необов'язково)"></textarea>
        <select id="taskPriority">
            <option value="1">Пріоритет: Низький (1)</option>
            <option value="2" selected>Пріоритет: Середній (2)</option>
            <option value="3">Пріоритет: Високий (3)</option>
            <option value="4">Пріоритет: Дуже високий (4)</option>
            <option value="5">Пріоритет: Критичний (5)</option>
        </select>
        <select id="taskDifficulty">
            <option value="1">Складність: Дуже легка (1)</option>
            <option value="2">Складність: Легка (2)</option>
            <option value="3" selected>Складність: Середня (3)</option>
            <option value="4">Складність: Складна (4)</option>
            <option value="5">Складність: Дуже складна (5)</option>
        </select>
        <input type="hidden" id="editTaskId" value="">
        <div class="modal-buttons">
            <button class="save-btn" onclick="saveTask()">Зберегти</button>
            <button class="cancel-btn" onclick="closeModal()">Скасувати</button>
        </div>
    </div>
</div>

<script>
let day = window.location.pathname.split('/').pop()
let currentTasks = []
let selectedTaskId = null
const TASK_ROW_HEIGHT = 80

function getStatusText(status) {
    const statuses = {
        'planning': '📝 Планується',
        'in_progress': '⏳ Виконується',
        'done': '✅ Завершено',
        'missed': '❌ Пропущено',
        'late': '⚠️ Запізнення'
    }
    return statuses[status] || status
}

function formatTime(isoString) {
    if (!isoString) return ''
    return isoString.slice(11, 16)
}

function escapeHtml(text){
    if(!text) return ''
    const div = document.createElement('div')
    div.textContent = text
    return div.innerHTML
}
function getDifficultyText(difficulty) {
    const texts = {1: 'Дуже легка', 2: 'Легка', 3: 'Середня', 4: 'Складна', 5: 'Дуже складна'}
    return texts[difficulty] || 'Середня'
}

function showMessage(msg, isError = false) {
    let toast = document.createElement('div')
    toast.className = 'toast'
    toast.style.background = isError ? '#ef4444' : '#10b981'
    toast.textContent = msg
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 3000)
}

function openCreateModal() {
    document.getElementById('editTaskId').value = ''
    document.getElementById('modalTitle').innerText = '📝 Нова задача'

    let today = new Date()
    let year = today.getFullYear()
    let month = String(today.getMonth() + 1).padStart(2, '0')
    let dayNum = String(today.getDate()).padStart(2, '0')

    let now = new Date()
    now.setMinutes(0, 0, 0)
    let startHour = now.getHours()
    let startTime = `${String(startHour).padStart(2, '0')}:00`
    let endHour = (startHour + 1) % 24
    let endTime = `${String(endHour).padStart(2, '0')}:00`

    document.getElementById('taskDate').value = `${year}-${month}-${dayNum}`
    document.getElementById('taskStart').value = startTime
    document.getElementById('taskEnd').value = endTime
    document.getElementById('taskName').value = ''
    document.getElementById('taskDesc').value = ''
    document.getElementById('taskPriority').value = '2'
    document.getElementById('taskDifficulty').value = '3'
    document.getElementById('modal').style.display = 'flex'
    document.getElementById('taskName').focus()
}

function openEditModal(taskId, event) {
    if (event && event.stopPropagation) event.stopPropagation()
    let task = currentTasks.find(t => t.id === taskId)
    if (!task) {
        showMessage('Помилка: задачу не знайдено', true)
        return
    }


    document.getElementById('editTaskId').value = task.id
    document.getElementById('modalTitle').innerText = '✏️ Редагувати задачу'
    document.getElementById('taskName').value = task.title
    document.getElementById('taskDesc').value = task.description || ''
    document.getElementById('taskDate').value = task.plan_start_time.slice(0, 10)
    document.getElementById('taskStart').value = task.plan_start_time.slice(11, 16)
    document.getElementById('taskEnd').value = task.plan_end_time.slice(11, 16)

    document.getElementById('taskPriority').value = task.priority
    document.getElementById('taskDifficulty').value = task.difficulty || 3
    document.getElementById('modal').style.display = 'flex'
}

function closeModal(){
    document.getElementById('modal').style.display = 'none'
}

function renderTimePanel() {
    let panel = document.getElementById('timePanel')
    panel.innerHTML = ''
    for (let h = 0; h < 24; h++) {
        panel.innerHTML += `<div class="time-slot">${String(h).padStart(2, '0')}:00</div>`
    }
}

function toMinutes(timeStr){
    let [h, m] = timeStr.split(':')
    return (+h) * 60 + (+m)
}

function getPriorityClass(priority) {
    return `p${priority}`
}

function getPriorityColor(priority) {
    const colors = {1: '#22c55e', 2: '#3b82f6', 3: '#eab308', 4: '#f97316', 5: '#ef4444'}
    return colors[priority] || '#6b7280'
}

function getPriorityText(priority) {
    const texts = {1: 'Низький', 2: 'Середній', 3: 'Високий', 4: 'Дуже високий', 5: 'Критичний'}
    return texts[priority] || 'Невідомо'
}

function getTopPosition(timeStr) {
    let minutes = toMinutes(timeStr)
    return (minutes / 60) * TASK_ROW_HEIGHT
}

function getTaskHeight(startTime, endTime) {
    let startMin = toMinutes(startTime)
    let endMin = toMinutes(endTime)
    return ((endMin - startMin) / 60) * TASK_ROW_HEIGHT
}

function selectTask(taskId) {
    selectedTaskId = taskId
    renderDetailsPanel(currentTasks)
    document.querySelectorAll('.task-card').forEach(card => {
        if (card.dataset.taskId === taskId) {
            card.classList.add('selected')
        } else {
            card.classList.remove('selected')
        }
    })
}

function editSelectedTask() {
    console.log('editSelectedTask called, selectedTaskId:', selectedTaskId) // Для дебагу
    if (selectedTaskId) {
        let task = currentTasks.find(t => t.id === selectedTaskId)
        if (task) {
            openEditModal(selectedTaskId, {stopPropagation: () => {}})
        } else {
            showMessage('Помилка: задачу не знайдено', true)
        }
    } else {
        showMessage('Виберіть задачу для редагування', true)
    }
}

async function deleteSelectedTask() {
    if (selectedTaskId && confirm('Видалити задачу?')) {
        await deleteTask(selectedTaskId, null)
        selectedTaskId = null
    }
}

async function deleteTask(taskId, event) {
    if (event) event.stopPropagation()
    try {
        let res = await fetch(`/api/tasks/${taskId}`, {method: 'DELETE'})
        if (res.ok) {
            await load()
            showMessage('🗑️ Задачу видалено')
        } else {
            showMessage('Помилка видалення', true)
        }
    } catch(e) {
        showMessage('Помилка з\'єднання', true)
    }
}

async function startTask(taskId, event) {
    if (event) event.stopPropagation()
    try {
        let res = await fetch(`/api/tasks/${taskId}/start`, {method: 'POST'})
        if (!res.ok) throw new Error()
        await load()
        showMessage('▶ Задачу розпочато')
    } catch(e) {
        showMessage('Помилка запуску задачі', true)
    }
}

async function finishTask(taskId, event) {
    if (event) event.stopPropagation()
    let pleasure = prompt("Оцініть задоволення від задачі (1-5):", "3")
    let productivity = prompt("Оцініть продуктивність (0-100):", "70")
    if (!pleasure || !productivity) return

    try {
        let res = await fetch(`/api/tasks/${taskId}/complete`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                pleasure: parseInt(pleasure),
                productivity_score: parseInt(productivity)
            })
        })
        if (!res.ok) throw new Error()
        await load()
        showMessage('✅ Задачу завершено')
    } catch(e) {
        showMessage('Помилка завершення задачі', true)
    }
}

async function saveTask() {
    let taskId = document.getElementById('editTaskId').value
    let taskDate = document.getElementById('taskDate').value
    let startTime = document.getElementById('taskStart').value
    let endTime = document.getElementById('taskEnd').value
    let data = {
        title: document.getElementById('taskName').value.trim(),
        description: document.getElementById('taskDesc').value.trim(),
        plan_start_time: `${taskDate}T${startTime}:00`,
        plan_end_time: `${taskDate}T${endTime}:00`,
        priority: parseInt(document.getElementById('taskPriority').value),
        difficulty: parseInt(document.getElementById('taskDifficulty').value)
    }
    if (!data.title) {
        showMessage('Введіть назву задачі', true)
        return
    }
    if (data.plan_start_time >= data.plan_end_time) {
        showMessage('Час початку має бути раніше часу завершення', true)
        return
    }

    try {
        let url = taskId ? `/api/tasks/${taskId}` : '/api/tasks'
        let method = taskId ? 'PUT' : 'POST'

        let res = await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })

        if (res.status === 409) {
            const errorData = await res.json();
            showMessage(errorData.detail || 'Конфлікт часу! Задача перетинається з іншою', true);
            return;
        }
        if (res.ok) {
            closeModal()
            await load()
            showMessage(taskId ? 'Задачу оновлено' : 'Задачу створено')
        } else {
            showMessage('Помилка', true)
        }
    } catch(e) {
        showMessage('Помилка з\'єднання', true)
    }
}

function renderDetailsPanel(tasks) {
    let panel = document.getElementById('taskDetails')
    if (!tasks.length) {
        panel.innerHTML = '<p class="no-selection">📭 Немає задач на цей день</p>'
        return
    }
    let selectedTask = tasks.find(t => t.id === selectedTaskId)
    if (!selectedTask) {
        panel.innerHTML = '<p class="no-selection">👈 Натисніть на задачу</p>'
        return
    }

    let start = selectedTask.plan_start_time.slice(11, 16)
    let end = selectedTask.plan_end_time.slice(11, 16)

    panel.innerHTML = `
        <div class="detail-title">📌 ${escapeHtml(selectedTask.title)}</div>
        <div class="detail-time">⏰ ${start} - ${end}</div>
        <div class="detail-priority" style="background: ${getPriorityColor(selectedTask.priority)};">
            ${getPriorityText(selectedTask.priority)}
        </div>
        <div class="detail-difficulty">📊 Складність: ${getDifficultyText(selectedTask.difficulty || 3)}</div>
        <div class="detail-status">📌 Статус: ${getStatusText(selectedTask.status)}</div>
        ${selectedTask.description ? `<div class="detail-desc">📝 ${escapeHtml(selectedTask.description)}</div>` : ''}
        <div class="detail-actions">
            ${selectedTask.status === 'planning' ? `<button class="detail-btn start" onclick="startTask(${selectedTask.id}, event)">▶ Почати</button>` : ''}
            ${selectedTask.status === 'in_progress' || selectedTask.status === 'late' ? `<button class="detail-btn finish" onclick="finishTask(${selectedTask.id}, event)">✅ Завершити</button>` : ''}
        </div>
        <div class="detail-edit-delete">
            <button class="detail-edit-btn" onclick="editSelectedTask()">✏️ Редагувати</button>
            <button class="detail-delete-btn" onclick="deleteSelectedTask()">🗑️ Видалити</button>
        </div>`
}

function renderTasks(tasks) {
    let container = document.getElementById('tasksContainer')
    container.innerHTML = ''

    if (!tasks.length) {
        container.innerHTML = '<div class="empty-state">📭 Немає задач на цей день</div>'
        return
    }

    tasks.forEach(task => {
        let start = task.plan_start_time.slice(11, 16)
        let end = task.plan_end_time.slice(11, 16)
        let top = getTopPosition(start)
        let height = getTaskHeight(start, end)
        let finalTop = Math.max(0, top)
        let finalHeight = Math.min(24 * TASK_ROW_HEIGHT - finalTop, height)

        if (finalHeight <= 0) return

        let taskCard = document.createElement('div')
        taskCard.className = `task-card ${getPriorityClass(task.priority)}`
        taskCard.dataset.taskId = task.id
        taskCard.style.top = finalTop + 'px'
        taskCard.style.height = finalHeight + 'px'
        taskCard.onclick = () => selectTask(task.id)

        taskCard.innerHTML = `
            <div class="task-header">
                <span class="task-title">${escapeHtml(task.title)}</span>
                <span class="task-time">${start} - ${end}</span>
            </div>
            <div class="task-badges">
                <span class="difficulty-badge">📊 ${getDifficultyText(task.difficulty || 3)}</span>
                <span class="status-badge">${getStatusText(task.status)}</span>
            </div>`
        container.appendChild(taskCard)
    })
}

async function load() {
    renderTimePanel()
    try {
        let res = await fetch(`/api/tasks/day/${day}`)
        if (res.status === 401) location = '/login'
        if (!res.ok) throw new Error()
        currentTasks = await res.json()
        renderTasks(currentTasks)
        renderDetailsPanel(currentTasks)
    } catch(e) {
        showMessage('Помилка завантаження задач', true)
    }
}
document.getElementById('modal').addEventListener('click', function(e){
    if(e.target === this) closeModal()
})


load()
</script>
{% endblock %}
