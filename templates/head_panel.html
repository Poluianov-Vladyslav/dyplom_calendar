<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Навігаційна панель{% endblock %}</title>
    <link rel="stylesheet" href="/static/head_panel.css">
    {% block extra_css %}{% endblock %}
</head>

<body>
<div class="navbar">
    <div class="nav-left">📅 Task Manager</div>
    <div class="nav-right">
        <div class="notification-icon" onclick="toggleNotifications()">
            🔔
            <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
        </div>
        <label class="user-name"> Добрий день {{ username }}</label>
        <a href="/calendar" class="nav-btn calendar">📅 Календар</a>
        <a href="/analytics" class="nav-btn analytics">📊 Аналітика</a>
        <button class="nav-btn settings" onclick="openPasswordModal()">Змінити пароль</button>
        <button class="nav-btn logout" onclick="logout()">Вийти</button>
    </div>
</div>

<div id="notificationsPanel" class="notifications-panel" style="display: none;">
    <div class="notifications-header">
        <h3>🔔 Сповіщення</h3>
        <div class="notifications-header-buttons">
            <button onclick="markAllRead()" class="mark-read-btn">Всі прочитані</button>
            <button onclick="closeNotificationsPanel()" class="close-btn">✕</button>
        </div>
    </div>
    <div id="notificationsList" class="notifications-list">
        <div class="loading">Завантаження...</div>
    </div>
</div>


<div class="container">
    {% block content %}{% endblock %}
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h3> Зміна паролю</h3>
        <input type="password" id="oldPassword" placeholder="Старий пароль">
        <input type="password" id="newPassword" placeholder="Новий пароль">
        <input type="password" id="confirmPassword" placeholder="Підтвердіть новий пароль">
        <div class="modal-buttons">
            <button class="nav-btn settings" onclick="changePassword()">Зберегти</button>
            <button class="nav-btn logout" onclick="closePasswordModal()">Скасувати</button>
        </div>
    </div>
</div>
<script>
let isPanelOpen = false;

function logout(){
    fetch('/api/logout', {method:'POST'})
    .then(() => window.location.href = '/login')
    .catch(() => window.location.href = '/login');
}

function openPasswordModal() {
    document.getElementById('passwordModal').style.display = 'flex';
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
}

function closePasswordModal() {
    document.getElementById('passwordModal').style.display = 'none';
}

function showMessage(msg, isError) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isError ? '#ef4444' : '#10b981';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

async function changePassword() {
    let oldPwd = document.getElementById('oldPassword').value;
    let newPwd = document.getElementById('newPassword').value;
    let confirmPwd = document.getElementById('confirmPassword').value;
    if (!oldPwd || !newPwd) {
        showMessage('Заповніть всі поля', true);
        return;
    }
    if (newPwd !== confirmPwd) {
        showMessage('Новий пароль і підтвердження не співпадають', true);
        return;
    }
    try {
        let res = await fetch('/api/change-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                old_password: oldPwd,
                new_password: newPwd
            })
        });
        let data = await res.json();
        if (res.ok) {
            showMessage('Пароль успішно змінено!');
            closePasswordModal();
        } else {
            showMessage((data.detail || 'Помилка зміни паролю'), true);
        }
    } catch(e) {
        showMessage(' Помилка з\'єднання', true);
    }
}
async function updateUnreadCount() {
    try {
        const res = await fetch('/api/notifications/unread-count');
        const data = await res.json();
        const badge = document.getElementById('notificationBadge');
        if (data.count > 0) {
            badge.style.display = 'flex';
            badge.innerText = data.count > 99 ? '99+' : data.count;
        } else {
            badge.style.display = 'none';
        }
    } catch(e) {
        console.error('Помилка отримання кількості сповіщень', e);
    }
}

async function loadNotificationsList() {
    const list = document.getElementById('notificationsList');
    list.innerHTML = '<div class="loading">Завантаження...</div>';
    try {
        const res = await fetch('/api/notifications');
        const notifications = await res.json();
        if (notifications.length === 0) {
            list.innerHTML = '<div class="empty">📭 Немає нових сповіщень</div>';
        } else {
            list.innerHTML = notifications.map(n => `
                <div class="notification-item" data-id="${n.id}">
                    <div class="notification-title">${escapeHtml(n.title)}</div>
                    <div class="notification-message">${escapeHtml(n.message)}</div>
                    <div class="notification-time">${formatDate(n.created_at)}</div>
                    <button onclick="markRead(${n.id})" class="mark-read-btn-small">✓</button>
                </div>
            `).join('');
        }
    } catch(e) {
        console.error('Помилка завантаження сповіщень', e);
        list.innerHTML = '<div class="empty">Помилка завантаження</div>';
    }
}

async function markRead(notificationId) {
    try {
        await fetch(`/api/notifications/${notificationId}/read`, {method: 'POST'});
        updateUnreadCount();
        if (isPanelOpen) {
            loadNotificationsList();
        }
    } catch(e) {
        console.error('Помилка', e);
    }
}

async function markAllRead() {
    try {
        await fetch('/api/notifications/read-all', {method: 'POST'});
        updateUnreadCount();
        if (isPanelOpen) {
            loadNotificationsList();
        }
    } catch(e) {
        console.error('Помилка', e);
    }
}

function toggleNotifications() {
    const panel = document.getElementById('notificationsPanel');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        isPanelOpen = true;
        loadNotificationsList();
    } else {
        panel.style.display = 'none';
        isPanelOpen = false;
    }
}

function closeNotificationsPanel() {
    document.getElementById('notificationsPanel').style.display = 'none';
    isPanelOpen = false;
}

function formatDate(dateStr) {
    const date = new Date(dateStr);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffMins < 1) return 'Щойно';
    if (diffMins < 60) return `${diffMins} хв тому`;
    if (diffHours < 24) return `${diffHours} год тому`;
    if (diffDays < 7) return `${diffDays} дн тому`;
    return date.toLocaleDateString();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.addEventListener('click', function(e) {
    const panel = document.getElementById('notificationsPanel');
    const icon = document.querySelector('.notification-icon');
    if (panel && panel.style.display === 'block' && !panel.contains(e.target) && !icon.contains(e.target)) {
        panel.style.display = 'none';
        isPanelOpen = false;
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeNotificationsPanel();
        closePasswordModal();
    }
});
document.getElementById('passwordModal')?.addEventListener('click', function(e) {
    if (e.target === this) closePasswordModal();});

updateUnreadCount();
setInterval(updateUnreadCount, 30000);
</script>

</body>
</html>
